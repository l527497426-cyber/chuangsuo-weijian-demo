<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>创中探索复刻</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <div class="ascii-field" aria-hidden="true"></div>
      <div class="glow-orbit" aria-hidden="true"></div>

      <aside class="sidebar">
        <div class="side-top">
          <div class="brand-row">
            <img src="./assets/figma/e32d8c72-1547-4e6b-b973-97d431e2dbac.svg" alt="" class="brand-mark" />
            <span class="brand-text">抖音AI工坊</span>
          </div>

          <button class="create-btn" type="button"><span>＋</span>AI 创作</button>

          <nav class="main-nav" aria-label="主导航">
            <a class="nav-item active" href="#">
              <img src="./assets/figma/0be3fd52-7ddd-4312-a97c-2680220a0477.svg" alt="" />
              <span>Skills</span>
            </a>
            <a class="nav-item" href="#">
              <img src="./assets/figma/2127c90b-0f26-462c-8b65-a9cb566c265a.svg" alt="" />
              <span>资源库</span>
            </a>
          </nav>

          <section class="project-tree" aria-label="我的项目">
            <header>
              <span>我的项目</span>
              <img src="./assets/figma/ad44f513-60ad-4ab9-9e5b-c896f3f6b881.svg" alt="" />
            </header>
            <div class="folder open">
              <button type="button">⌄ <span>我的AI分身</span></button>
              <a href="#"><i></i><span>项目文件</span></a>
              <a href="#"><i class="orange"></i><span>触发器</span></a>
              <a href="#"><i class="violet"></i><span>发布</span></a>
            </div>
            <div class="folder open">
              <button type="button">⌄ <span>塔罗小程序</span></button>
              <a href="#"><i></i><span>项目文件</span></a>
              <a href="#"><i class="green"></i><span>数据库</span></a>
              <a href="#"><i class="violet"></i><span>发布</span></a>
            </div>
            <div class="folder collapsed"><button type="button">› <span>项目名称_03</span></button></div>
            <div class="folder collapsed"><button type="button">› <span>项目名称_04</span></button></div>
          </section>
        </div>

        <div class="user-chip">
          <span class="avatar"></span>
          <span>JJJwx2333</span>
        </div>
      </aside>

      <section class="workspace">
        <div class="floating-gallery figma-glass-orbit" aria-hidden="true"></div>
        <div class="gallery-veil" aria-hidden="true"></div>

        <header class="hero-title">
          <h1>创作未见 · 小程序</h1>
          <p>所见即所得，链接抖音生态</p>
        </header>

        <form class="prompt-box">
          <textarea aria-label="小程序描述" placeholder="请描述你要生成的小程序"></textarea>
          <div class="prompt-actions">
            <div class="left-actions">
              <button type="button">扩展</button>
              <button type="button" class="icon-only" aria-label="附件">
                <img src="./assets/figma/5d74f965-9eeb-4a7c-a4df-88a572863024.svg" alt="" />
              </button>
            </div>
            <div class="right-actions">
              <button type="button" class="auto-btn">
                <img src="./assets/figma/5f1cf776-4650-44bc-8e99-11880f131e69.svg" alt="" />
                Auto
                <img src="./assets/figma/f7deb977-0c7f-4b71-a2ae-d674589c4c7b.svg" alt="" />
              </button>
              <button class="send-btn" type="submit" aria-label="发送">↑</button>
            </div>
          </div>
        </form>

        <section class="recent">
          <h2>最近项目</h2>
          <div class="cards">
            <button class="new-card" type="button">
              <span>
                <img src="./assets/figma/wow-26-06/create-plus-284-31558.svg" alt="" />
                创建新项目
              </span>
            </button>

            <article class="project-card">
              <div class="card-head">
                <div><h3>天气预报</h3><p>更新于06.24 22:32</p></div>
                <button type="button" aria-label="更多">…</button>
              </div>
              <div class="phone-preview">
                <img class="screen" src="./assets/figma/1b01614c-8358-41e6-b302-9fe1c826e32a.png" alt="" />
                <img class="device" src="./assets/figma/541c9786-3124-4c70-be0d-916f68376e3e.png" alt="" />
              </div>
            </article>

            <article class="project-card">
              <div class="card-head">
                <div><h3>小游戏</h3><p>更新于06.24 22:32</p></div>
                <button type="button" aria-label="更多">…</button>
              </div>
              <div class="phone-preview">
                <img class="screen" src="./assets/figma/5c2fd835-9297-4caa-a6b6-a74b641c421c.png" alt="" />
                <img class="device" src="./assets/figma/541c9786-3124-4c70-be0d-916f68376e3e.png" alt="" />
              </div>
            </article>

            <article class="project-card">
              <div class="card-head">
                <div><h3>冥想时间</h3><p>更新于06.24 22:32</p></div>
                <button type="button" aria-label="更多">…</button>
              </div>
              <div class="phone-preview">
                <img class="screen" src="./assets/figma/bcd6ae8d-6041-48f1-8671-9587b9f687ed.png" alt="" />
                <img class="device" src="./assets/figma/541c9786-3124-4c70-be0d-916f68376e3e.png" alt="" />
              </div>
            </article>
          </div>
        </section>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
